<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manibot HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
:root{--bg:#0A0A0B;--s1:#111113;--s2:#18181B;--s3:#1F1F23;--b:rgba(255,255,255,.08);--bs:rgba(255,255,255,.16);--t1:#F5F5F7;--t2:#A1A1AA;--t3:#52525B;--o:#FC4C02;--oh:#FF6A2C;--og:rgba(252,76,2,.22);--ok:#22C55E;--wn:#F59E0B;--dn:#EF4444}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(252,76,2,.07),transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(252,76,2,.04),transparent 50%);pointer-events:none;z-index:0}
.app{display:flex;height:100vh;position:relative;z-index:1}
.sb{width:220px;background:var(--s1);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:14px 0;flex-shrink:0}
.logo{padding:0 14px 16px;border-bottom:1px solid var(--b);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.logo-i{width:30px;height:30px;background:linear-gradient(135deg,var(--o),#FF8540);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;color:#fff;box-shadow:0 0 16px var(--og);flex-shrink:0}
.logo-t{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px}
.logo-s{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;letter-spacing:1.5px;text-transform:uppercase}
.nav{padding:0 8px;flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;color:var(--t2);cursor:pointer;font-weight:500;font-size:13px;user-select:none;position:relative;transition:background .12s,color .12s}
.ni:hover{background:var(--s2);color:var(--t1)}
.ni.ac{background:var(--s2);color:var(--t1)}
.ni.ac::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:15px;background:var(--o);border-radius:0 2px 2px 0;box-shadow:0 0 8px var(--og)}
.ni-ic{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.ni-b{margin-left:auto;background:var(--s3);color:var(--t2);padding:1px 6px;border-radius:9px;font-size:10px;font-family:'JetBrains Mono',monospace}
.ni.ac .ni-b{background:var(--o);color:#fff}
.uc{margin:8px;padding:11px;background:var(--s2);border:1px solid var(--b);border-radius:9px}
.u-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.u-av{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--o),#C03000);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex-shrink:0}
.u-name{font-size:12px;font-weight:600}.u-lv{font-size:10px;color:var(--t2);font-family:'JetBrains Mono',monospace}
.xb{height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.xf{height:100%;background:linear-gradient(90deg,var(--o),#FF8540);transition:width .4s}
.xr{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--t3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:48px;background:var(--s1);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.bc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px}
.bc span{color:var(--o)}
.tb-right{margin-left:auto;display:flex;gap:5px}
.page{flex:1;overflow-y:auto;padding:18px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
.btn{padding:7px 13px;border-radius:7px;font-weight:500;font-size:12px;cursor:pointer;border:1px solid var(--b);background:var(--s2);color:var(--t1);font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:5px;transition:all .12s;user-select:none;white-space:nowrap}
.btn:hover{border-color:var(--bs);background:var(--s3)}
.btn:active{opacity:.85}
.btn.pr{background:var(--o);border-color:var(--o);color:#fff;font-weight:600}
.btn.pr:hover{background:var(--oh);box-shadow:0 0 12px var(--og)}
.btn.dg{color:var(--dn);border-color:rgba(239,68,68,.2)}
.btn.dg:hover{background:rgba(239,68,68,.1);border-color:var(--dn)}
.btn.gh{background:transparent;border-color:transparent;color:var(--t2)}
.btn.gh:hover{background:var(--s2);color:var(--t1)}
.btn.sm{padding:4px 10px;font-size:11px}
.btn.xs{padding:3px 7px;font-size:10px}
.ib{width:28px;height:28px;border:1px solid var(--b);background:var(--s2);border-radius:6px;color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;transition:all .12s;flex-shrink:0;user-select:none}
.ib:hover{border-color:var(--bs);color:var(--t1);background:var(--s3)}
.ib:active{opacity:.8}
.ib.red:hover{border-color:var(--dn);color:var(--dn);background:rgba(239,68,68,.08)}
.ph{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.ph-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--o);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}
.ph-t{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;line-height:1}
.ph-a{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sd{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
.sd h2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;white-space:nowrap}
.sd .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--b),transparent)}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4,.g3{grid-template-columns:1fr 1fr}}
@media(max-width:750px){.sb{display:none}.g4,.g3,.g2{grid-template-columns:1fr}}
.card{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:16px}
.card:hover{border-color:var(--bs)}
.card.hl{border-top:2px solid var(--o)}
.qt{background:linear-gradient(135deg,rgba(252,76,2,.06),transparent);border:1px solid var(--b);border-left:3px solid var(--o);border-radius:10px;padding:13px 16px;margin-bottom:14px;font-style:italic;font-size:13px;line-height:1.6;color:var(--t2)}
.qt strong{color:var(--t1);font-style:normal}
.qt .qa{display:block;margin-top:4px;font-size:10px;color:var(--o);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1.5px;font-style:normal}
.kp{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:13px}
.kp:hover{border-color:var(--bs)}
.kp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.kp-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1.5px}
.kp-val{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1}
.kp-sub{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--t3);margin-top:2px}
.hr{display:flex;align-items:center;gap:9px;padding:11px;background:var(--s1);border:1px solid var(--b);border-radius:9px;transition:border-color .12s}
.hr:hover{border-color:var(--bs)}
.hr.done-h .hn{text-decoration:line-through;opacity:.5}
.hck{width:20px;height:20px;border:2px solid var(--bs);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--s2);cursor:pointer;transition:all .12s;font-size:11px;font-weight:700;color:#fff}
.hck:hover{border-color:var(--o)}
.hr.done-h .hck{background:var(--o);border-color:var(--o)}
.hkb{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0}
.hinfo{flex:1;min-width:0;cursor:pointer}
.hn{font-weight:500;font-size:13px;margin-bottom:2px}
.hm{display:flex;gap:7px;font-size:10px;color:var(--t2);font-family:'JetBrains Mono',monospace;flex-wrap:wrap}
.hm .hot{color:var(--o)}
.hpb{width:40px;height:3px;background:var(--s3);border-radius:2px;overflow:hidden;flex-shrink:0}
.hpf{height:100%;background:var(--o)}
.pb{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin:7px 0 3px}
.pf{height:100%;background:linear-gradient(90deg,var(--o),#FF8540);border-radius:3px;transition:width .7s}
.step{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--s2);border:1px solid var(--b);border-radius:7px;margin-top:4px;transition:border-color .12s}
.step:hover{border-color:var(--bs)}
.step.done-s{opacity:.45}
.step.done-s .stxt{text-decoration:line-through}
.sck{width:16px;height:16px;border:2px solid var(--bs);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--s1);font-size:10px;font-weight:700;color:#fff;transition:all .12s}
.sck:hover{border-color:var(--o)}
.step.done-s .sck{background:var(--o);border-color:var(--o)}
.stxt{flex:1;font-size:12px;line-height:1.3}
.tabs{display:flex;gap:3px;background:var(--s1);border:1px solid var(--b);border-radius:9px;padding:3px;margin-bottom:14px;overflow-x:auto}
.tab{padding:6px 13px;border-radius:6px;color:var(--t2);cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:all .12s;user-select:none}
.tab:hover{color:var(--t1)}
.tab.ac{background:var(--o);color:#fff}
.jcard{background:var(--s2);border:1px solid var(--b);border-radius:9px;padding:13px;margin-bottom:7px;transition:border-color .12s}
.jcard:hover{border-color:var(--bs)}
.pcard{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:15px;margin-bottom:9px}
.pcard:hover{border-color:var(--bs)}
.pcard.active{border-top:2px solid var(--o)}
.idea{display:flex;gap:9px;align-items:flex-start;padding:10px 11px;background:var(--s2);border:1px solid var(--b);border-radius:8px;margin-bottom:6px}
.idea:hover{border-color:var(--bs)}
.sbadge{padding:2px 8px;border-radius:7px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;text-transform:uppercase}
.sbadge.act{background:rgba(252,76,2,.18);color:var(--o);border:1px solid rgba(252,76,2,.3)}
.sbadge.done-p{background:rgba(34,197,94,.18);color:var(--ok);border:1px solid rgba(34,197,94,.3)}
.sbadge.paused{background:rgba(245,158,11,.18);color:var(--wn);border:1px solid rgba(245,158,11,.3)}
.sbadge.planned{background:var(--s3);color:var(--t3);border:1px solid var(--b)}
.dl-val{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1}
.dl-val.safe{color:var(--ok)}.dl-val.warn{color:var(--wn)}.dl-val.urgent{color:var(--dn)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-head{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);text-align:center;text-transform:uppercase;padding:5px 0;letter-spacing:.5px}
.cal-day{min-height:76px;background:var(--s1);border:1px solid var(--b);border-radius:7px;padding:5px;cursor:pointer;transition:border-color .12s;overflow:hidden}
.cal-day:hover{border-color:var(--bs)}
.cal-day.today{border-color:var(--o)}
.cal-day.other{opacity:.28}
.cal-dn{font-family:'JetBrains Mono',monospace;font-size:10px;margin-bottom:2px}
.cal-day.today .cal-dn{color:var(--o);font-weight:700}
.cal-ev{font-size:9px;padding:1px 4px;border-radius:3px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'JetBrains Mono',monospace;cursor:pointer}
.cal-ev.local{background:rgba(252,76,2,.18);color:var(--o)}
.cal-ev.gcal{background:rgba(66,133,244,.18);color:#4285F4}
.cal-ev.goal-dl{background:rgba(239,68,68,.18);color:var(--dn)}
.hmap{display:flex;flex-direction:column;gap:3px}
.hm-row{display:flex;gap:3px}
.hmc{width:11px;height:11px;border-radius:2px;background:var(--s3)}
.hmc.l1{background:#5c2a00}.hmc.l2{background:rgba(252,76,2,.45)}.hmc.l3{background:var(--o)}.hmc.l4{background:#FF8540;box-shadow:0 0 3px var(--og)}
.hmc.tod{outline:2px solid var(--t1);outline-offset:1px}
.bar-wrap{display:flex;align-items:flex-end;gap:4px;height:70px}
.bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;cursor:pointer}
.bar-lbl{font-size:9px;color:var(--t3);text-align:center;font-family:'JetBrains Mono',monospace;margin-top:3px}
.ach{min-width:110px;padding:10px 8px;background:var(--s1);border:1px solid var(--b);border-radius:9px;text-align:center;flex-shrink:0}
.ach.unlocked{border-color:var(--o);background:rgba(252,76,2,.05)}
.ach.locked{opacity:.3}
.gcbox{border-radius:10px;padding:16px;text-align:center;margin-bottom:14px;border:1px solid rgba(66,133,244,.3);background:rgba(66,133,244,.05)}
.gcbox.connected{border-color:var(--ok);background:rgba(34,197,94,.05)}
.focus-strip{background:var(--s2);border:1px solid var(--b);border-left:3px solid var(--o);border-radius:8px;padding:11px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.ins{background:rgba(252,76,2,.05);border:1px solid rgba(252,76,2,.18);border-radius:9px;padding:11px 13px;margin-bottom:7px;font-size:12px;line-height:1.5}
.ins strong{color:var(--o)}
.fld{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.flbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1.5px}
.flbl .req{color:var(--o)}
.fld input,.fld textarea,.fld select{background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:8px 10px;color:var(--t1);font-family:'Inter',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color .12s}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--o)}
.fld textarea{resize:vertical;min-height:68px;line-height:1.5}
.daybtn{padding:5px 9px;background:var(--s2);border:1px solid var(--b);border-radius:6px;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t2);transition:all .12s;user-select:none}
.daybtn.ac{background:var(--o);color:#fff;border-color:var(--o)}
.daybtn:hover{border-color:var(--bs)}
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:14px}
.mo-bg.open{display:flex}
.mo-box{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:20px;width:100%;max-height:92vh;overflow-y:auto}
.mo-box.sm{max-width:430px}.mo-box.md{max-width:520px}.mo-box.lg{max-width:660px}
.mo-box::-webkit-scrollbar{width:4px}.mo-box::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.mdh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mdt{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.toast-c{position:fixed;top:14px;right:14px;z-index:2000;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--b);border-radius:9px;padding:9px 13px;display:flex;gap:9px;align-items:flex-start;box-shadow:0 6px 18px rgba(0,0,0,.4);animation:tIn .22s ease;min-width:200px;max-width:280px}
.toast.ok{border-color:var(--ok)}.toast.err{border-color:var(--dn)}.toast.warn{border-color:var(--wn)}
@keyframes tIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
.t-ttl{font-weight:600;font-size:12px}.t-sub{font-size:11px;color:var(--t2);margin-top:1px}
.empty{padding:36px 16px;text-align:center;color:var(--t2)}
.empty-ic{font-size:36px;opacity:.2;margin-bottom:9px}
.empty-t{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--t1);margin-bottom:5px;letter-spacing:1px}
.empty-s{font-size:12px;margin-bottom:14px}
</style>
</head>
<body>
<div class="app">
  <aside class="sb">
    <div class="logo">
      <div class="logo-i">M</div>
      <div><div class="logo-t">MANIBOT</div><div class="logo-s">HQ · V4</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="uc">
      <div class="u-row">
        <div class="u-av" id="u-av">M</div>

</div>

<script>
'use strict';
const DB_NAME='manibot-v7',DB_VER=7;
const STORES=['habits','logs','goals','gsteps','journal','projects','ideas','settings','calevents'];
const CAT_CLR={Daily:'#FC4C02',AI:'#00ff88',School:'#3366ff',Health:'#ff3366',Fitness:'#00ddff',Work:'#ffaa00',Other:'#999'};
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const QTS=[['The best way to predict the future is to create it.','Peter Drucker'],['Discipline equals freedom.','Jocko Willink'],['Vision without execution is hallucination.','Thomas Edison'],['Hard work beats talent when talent doesn\'t work hard.','Tim Notke'],['We become what we repeatedly do.','Sean Covey'],['Action is the foundational key to all success.','Pablo Picasso'],['Stay hungry. Stay foolish.','Steve Jobs'],['Fall seven times and stand up eight.','Japanese Proverb'],['Do or do not. There is no try.','Yoda'],['Ideas are easy. Implementation is hard.','Guy Kawasaki'],['Whether you think you can or you can\'t — you\'re right.','Henry Ford'],['The successful warrior is the average man with laser-like focus.','Bruce Lee'],['The secret of getting ahead is getting started.','Mark Twain'],['It always seems impossible until it\'s done.','Nelson Mandela'],['Opportunities don\'t happen. You create them.','Chris Grosser'],['The only way to do great work is to love what you do.','Steve Jobs'],['Dream big and dare to fail.','Norman Vaughan'],['Consistency is the mother of mastery.','Robin Sharma'],['Be so good they can\'t ignore you.','Steve Martin'],['You don\'t rise to your goals — you fall to your systems.','James Clear'],['Don\'t count the days. Make the days count.','Muhammad Ali'],['One day or day one. You decide.','Paulo Coelho'],['Embrace the pain. It\'s making you stronger.','David Goggins'],['Comfort is the enemy of achievement.','Farrah Gray'],['Success is the sum of small efforts repeated daily.','Robert Collier'],['Your time is limited — don\'t waste it living someone else\'s life.','Steve Jobs'],['The best revenge is massive success.','Frank Sinatra'],['Own your morning. Elevate your life.','Robin Sharma'],['When something is important enough, you do it even if odds are against you.','Elon Musk'],['I think ordinary people can choose to be extraordinary.','Elon Musk'],['What gets measured gets managed.','Peter Drucker'],['Earn your complexity.','Derek Sivers']];
let DB=null;
const S={habits:[],logs:[],goals:[],gsteps:[],journal:[],projects:[],ideas:[],calevents:[],gcalevents:[],settings:{id:'main',xp:0,username:'Operator',location:'',focus:'',gclientId:''},view:'today',jtab:'daily',calM:new Date().getMonth(),calY:new Date().getFullYear(),gToken:null,gConnected:false};
const $=s=>document.querySelector(s);
const uid=()=>crypto.randomUUID?.()??'id-'+Date.now()+'-'+Math.random().toString(36).slice(2);
const today=()=>new Date().toISOString().slice(0,10);
const now=()=>new Date().toISOString();
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dayI=ds=>{const w=new Date(ds).getDay();return w?w-1:6};

function openDB(){return new Promise((res,rej)=>{const q=indexedDB.open(DB_NAME,DB_VER);q.onupgradeneeded=e=>{const db=e.target.result;['readings','books','notes','chat','prs','acts'].forEach(s=>{try{if(db.objectStoreNames.contains(s))db.deleteObjectStore(s)}catch(_){}});STORES.forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'})})};q.onsuccess=e=>{DB=e.target.result;res(DB)};q.onerror=e=>rej(e.target.error)})}
const dbAll=s=>new Promise(r=>{try{const t=DB.transaction(s,'readonly');const q=t.objectStore(s).getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>r([])}catch{r([])}});
const dbPut=(s,o)=>new Promise(r=>{try{const t=DB.transaction(s,'readwrite');t.objectStore(s).put(o);t.oncomplete=()=>r(o);t.onerror=()=>r(null)}catch{r(null)}});
const dbDel=(s,id)=>new Promise(r=>{try{const t=DB.transaction(s,'readwrite');t.objectStore(s).delete(id);t.oncomplete=()=>r(true);t.onerror=()=>r(false)}catch{r(false)}});

function todayHabs(){const di=dayI(today());return S.habits.filter(h=>!h.days||h.days.includes(di))}
function habDone(h){const l=S.logs.find(x=>x.habitId===h.id&&x.date===today());return!!(l&&l.done)}
function habStreak(id){const h=S.habits.find(x=>x.id===id);if(!h)return 0;let s=0;const d=new Date();for(let i=0;i<365;i++){const ds=d.toISOString().slice(0,10),di=dayI(ds);const sch=!h.days||h.days.includes(di);const l=S.logs.find(x=>x.habitId===id&&x.date===ds);if(!sch){d.setDate(d.getDate()-1);continue}if(l&&l.done)s++;else if(i>0)break;d.setDate(d.getDate()-1)}return s}
function hab30(id){const h=S.habits.find(x=>x.id===id);if(!h)return 0;let done=0,tot=0;const dt=new Date();for(let i=0;i<30;i++){const ds=dt.toISOString().slice(0,10),di=dayI(ds);if(!h.days||h.days.includes(di)){tot++;if(S.logs.find(x=>x.habitId===id&&x.date===ds&&x.done))done++}dt.setDate(dt.getDate()-1)}return tot?Math.round(100*done/tot):0}
function vToday(){const t=new Date(),loc=S.settings.location?' · '+S.settings.location:'';const q=getQ(),th=todayHabs(),done2=th.filter(habDone).length;const sec={morning:[],afternoon:[],evening:[],anytime:[]};th.forEach(h=>(sec[h.time]||sec.anytime).push(h));const ls=S.habits.reduce((m,h)=>Math.max(m,habStreak(h.id)),0);const as=S.habits.length?Math.round(S.habits.reduce((s,h)=>s+hab30(h.id),0)/S.habits.length):0;const xp=S.settings.xp||0;let habHTML='';for(const[k,ic,r]of[['morning','☀','06–12'],['afternoon','🌤','12–18'],['evening','🌙','18–00']]){let L=sec[k].slice();if(k==='morning')L=L.concat(sec.anytime);const d=L.filter(habDone).length,p=L.length?Math.round(100*d/L.length):0;habHTML+=`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:7px;padding:5px 0 8px;border-bottom:1px solid var(--b);margin-bottom:9px"><span>${ic}</span><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:2px;flex:1">${k.toUpperCase()} · ${r}</span><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2)"><span style="color:var(--o)">${d}</span>/${L.length} · ${p}%</span></div><div style="display:flex;flex-direction:column;gap:7px">${L.length?L.map(h=>habRow(h)).join(''):'<div style="padding:10px;text-align:center;color:var(--t3);font-size:11px">No '+k+' habits</div>'}</div></div>`}
return `<div class="ph"><div><div class="ph-lbl">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][t.getDay()].toUpperCase()}</div><div class="ph-t">${MONTHS[t.getMonth()]} ${t.getDate()}, ${t.getFullYear()}${loc}</div></div><div class="ph-a"><button class="btn" data-a="cap">+ Capture</button><button class="btn pr" data-a="addHabit">+ Habit</button></div></div><div class="qt">"<strong>${esc(q[0])}</strong>"<span class="qa">— ${esc(q[1])}</span></div>${S.settings.focus?`<div class="focus-strip"><div><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--o);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px">TODAY'S FOCUS</div><div style="font-size:13px;font-weight:500">${esc(S.settings.focus)}</div></div><button class="btn xs gh" data-a="focus">Change</button></div>`:`<div style="margin-bottom:12px;text-align:right"><button class="btn sm" data-a="focus">⊕ Set Focus</button></div>`}<div class="grid g4" style="margin-bottom:18px"><div class="kp"><div class="kp-top"><div class="kp-lbl">STREAK</div><span>🔥</span></div><div class="kp-val">${ls}<span style="font-size:12px;color:var(--t2);font-family:'JetBrains Mono',monospace">d</span></div><div class="kp-sub">longest</div></div><div class="kp"><div class="kp-top"><div class="kp-lbl">30-DAY</div><span>◎</span></div><div class="kp-val">${as}<span style="font-size:12px;color:var(--t2);font-family:'JetBrains Mono',monospace">%</span></div><div class="kp-sub">avg completion</div></div><div class="kp"><div class="kp-top"><div class="kp-lbl">TODAY</div><span>✓</span></div><div class="kp-val">${done2}<span style="font-size:12px;color:var(--t2);font-family:'JetBrains Mono',monospace">/${th.length}</span></div><div class="kp-sub">habits done</div></div><div class="kp"><div class="kp-top"><div class="kp-lbl">XP</div><span>⚡</span></div><div class="kp-val">${xp}</div><div class="kp-sub">level ${Math.floor(xp/100)+1}</div></div></div><div class="sd"><h2>HABIT ROSTER</h2><div class="ln"></div><div style=" function habRow(h){const done=habDone(h),l=S.logs.find(x=>x.habitId===h.id&&x.date===today()),v=l?.value||0;const sk=habStreak(h.id),st=hab30(h.id);const vd=h.type==='count'?`${v}/${h.target}`:h.type==='duration'?`${v}/${h.target}m`:'';const days=h.days&&h.days.length<7?h.days.map(i=>DAYS[i]).join(','):'Daily';const ctr=(h.type==='count'||h.type==='duration')?`<div style="display:flex;align-items:center;gap:3px"><button class="ib" data-a="minus" data-id="${esc(h.id)}" style="width:24px;height:24px">−</button><span style="font-family:'JetBrains Mono',monospace;font-size:11px;min-width:22px;text-align:center">${v}</span><button class="ib" data-a="plus" data-id="${esc(h.id)}" style="width:24px;height:24px">+</button></div>`:'';return `<div class="hr${done?' done-h':''}" data-hid="${esc(h.id)}"><div class="hck" data-a="tog" data-id="${esc(h.id)}">${done?'✓':''}</div><div class="hkb" style="background:${CAT_CLR[h.category]||'#FC4C02'}"></div><div class="hinfo" data-a="editHabit" data-id="${esc(h.id)}"><div class="hn">${esc(h.name)}</div><div class="hm"><span>${esc(h.category)}</span>${vd?`<span>${vd}</span>`:''}<span class="${sk>=7?'hot':''}">🔥 ${sk}d</span><span>${st}%</span></div></div>${ctr}<div class="hpb"><div class="hpf" style="width:${st}%"></div></div><button class="ib" data-a="editHabit" data-id="${esc(h.id)}">✎</button><button class="ib red" data-a="delHabit" data-id="${esc(h.id)}">✕</button></div>`}
function achHTML(){const ls=S.habits.reduce((m,h)=>Math.max(m,habStreak(h.id)),0);const B=[['⚡','First Spark','FIRST HABIT',S.habits.length>0],['🔥','Week Warrior','7D STREAK',ls>=7],['💎','Diamond','30D STREAK',ls>=30],['🧠','Automatic','66 DAYS',ls>=66],['👑','Century','100 DAYS',ls>=100],['🎯','Goal Setter','FIRST GOAL',S.goals.length>0],['⬢','Builder','FIRST PROJECT',S.projects.length>0],['✎','Chronicler','10 JOURNALS',S.journal.length>=10]];return `<div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:4px">${B.map(b=>`<div class="ach ${b[3]?'unlocked':'locked'}"><div style="font-size:22px;margin-bottom:3px">${b[0]}</div><div style="font-size:10px;font-weight:600">${b[1]}</div><div style="font-size:9px;color:var(--t2);font-family:'JetBrains Mono',monospace;margin-top:2px">${b[2]}</div></div>`).join('')}</div>`}

function habRowFull(h){const done=habDone(h),sk=habStreak(h.id),st=hab30(h.id);const days=h.days&&h.days.length<7?h.days.map(i=>DAYS[i]).join(', '):'Every day';const v=S.logs.find(x=>x.habitId===h.id&&x.date===today())?.value||0;const ctr=(h.type==='count'||h.type==='duration')?`<div style="display:flex;align-items:center;gap:3px;margin-left:auto"><button class="ib" data-a="minus" data-id="${esc(h.id)}">−</button><span style="font-family:'JetBrains Mono',monospace;font-size:11px;min-width:26px;text-align:center">${v}${h.type==='duration'?'m':''}</span><button class="ib" data-a="plus" data-id="${esc(h.id)}">+</button></div>`:'';return `<div class="card${done?' done-h':''}"><div style="display:flex;gap:10px;align-items:flex-start"><div class="hck" data-a="tog" data-id="${esc(h.id)}" style="margin-top:2px;flex-shrink:0">${done?'✓':''}</div><div style="width:4px;border-radius:2px;align-self:stretch;background:${CAT_CLR[h.category]||'#FC4C02'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:3px"><div style="font-weight:600;font-size:13px${done?';text-decoration:line-through;opacity:.5':''}">${esc(h.name)}</div><span style="font-size:9px;background:var(--s3);padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;color:var(--t2)">${esc(h.category)}</span></div><div style="font-size:10px;color:var(--t2);font-family:'JetBrains Mono',monospace;margin-bottom:6px">${days}${h.target?' · target '+h.target+(h.type==='duration'?'m':''):''}</div>${h.ifThen?`<div style="font-size:11px;color:var(--t3);margin-bottom:6px;font-style:italic">${esc(h.ifThen)}</div>`:''}<div style="display:flex;gap:14px"><div><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase">Streak</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--o)">${sk}d</div></div><div><div style="font-family:'JetBrains Mono',monospace;font-size:9p function buildHeatmap(){const rows=[];for(let d=0;d<7;d++){let row='';for(let w=0;w<10;w++){const idx=70-(7*(10-w)+d+1);const dt=new Date();dt.setDate(dt.getDate()-idx);const ds=dt.toISOString().slice(0,10),isT=ds===today(),di=dayI(ds);const sch=S.habits.filter(h=>!h.days||h.days.includes(di)).length;const done=S.logs.filter(l=>l.date===ds&&l.done).length;let lv=0;if(sch>0){const p=done/sch;if(p>0&&p<.34)lv=1;else if(p>=.34&&p<.67)lv=2;else if(p>=.67&&p<1)lv=3;else if(p>=1)lv=4}row+=`<div class="hmc${lv?' l'+lv:''}${isT?' tod':''}" title="${ds}: ${done}/${sch}"></div>`}rows.push('<div class="hm-row">'+row+'</div>')}return '<div class="hmap">'+rows.join('')+'</div>'}

function vStats(){const days7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days7.push(d.toISOString().slice(0,10))}const bars=days7.map(ds=>{const di=dayI(ds),tot=S.habits.filter(h=>!h.days||h.days.includes(di)).length;const done=S.logs.filter(l=>l.date===ds&&l.done).length;return{ds,pct:tot?Math.round(100*done/tot):0,done,tot}});const avg7=bars.length?Math.round(bars.reduce((s,b)=>s+b.pct,0)/bars.length):0;const goalAvg=S.goals.length?Math.round(S.goals.reduce((s,g)=>s+(g.progress||0),0)/S.goals.length):0;const xp=S.settings.xp||0,ls=S.habits.reduce((m,h)=>Math.max(m,habStreak(h.id)),0);const ins=[];const lowDays=bars.filter(b=>b.pct<50&&b.tot>0);if(lowDays.length>=3)ins.push(`You had <strong>${lowDays.length} low-output days</strong> this week.`);const best=bars.reduce((b,x)=>x.pct>b.pct?x:b,{pct:-1});if(best.pct>=80)ins.push(`Best day: <strong>${best.ds}</strong> at <strong>${best.pct}%</strong>. Replicate that structure.`);const urgent=S.goals.filter(g=>dleft(g.deadline)<=7);if(urgent.length)ins.push(`<strong>${urgent.length} goal${urgent.length>1?'s':''}</strong> due within 7 days.`);if(ls>=7)ins.push(`You have a <strong>${ls}-day streak</strong>. Don't break the chain.`);if(!ins.length)ins.push('Keep building. <strong>Consistency compounds</strong>.');return `<div class="ph"><div><div class="ph-lbl">ANALYTICS</div><div class="ph-t">STATS</div></div></div><div class="grid g4" style="margin-bottom:18px"><div class="kp"><div class="kp-top"><div class="kp-lbl">7-DAY AVG</div></div><div class="kp-val">${avg7}<span style="font-size:12px;color:var(--t2);font-family:'JetBrains Mono',monospace">%</span></div><div class="kp-sub">habit completion</div></div><div class="kp"><div class="kp-top"><div class="kp-lbl">TOTAL XP</div></div><div class="kp-val">${xp}</div><div class="kp-sub">level ${Math.floor(xp/100)+1}</div></div><div class="kp"><div class="kp-top"><div class="kp-lbl">GOALS</div></div><div class="kp-val">${goalAvg}<span style="font-size:1 async function deleteGoal(id){if(!confirm('Delete this goal?'))return;await dbDel('goals',id);for(const s of S.gsteps.filter(s=>s.goalId===id))await dbDel('gsteps',s.id);S.goals=S.goals.filter(x=>x.id!==id);S.gsteps=S.gsteps.filter(x=>x.goalId!==id);closeModal();render();renderNav();toast('Goal deleted')}
function stepModal(goalId){openModal(`<div class="mdh"><div class="mdt">ADD STEP</div><button class="ib" id="mc">✕</button></div><div class="fld"><div class="flbl">Step <span class="req">*</span></div><input id="st-txt" placeholder="Specific action…"/></div><button class="btn pr" id="st-save" style="width:100%;margin-top:10px">Add Step</button>`,'sm');onBtn('mc',closeModal);document.getElementById('st-txt')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('st-save')?.click()});onBtn('st-save',async()=>{const t=inp('st-txt').trim();if(!t)return;const s={id:uid(),goalId,text:t,done:false,createdAt:now()};await dbPut('gsteps',s);S.gsteps.push(s);await syncGoalProg(goalId);closeModal();render();toast('Step added')})}
function goalProgModal(id){const g=S.goals.find(x=>x.id===id);if(!g)return;openModal(`<div class="mdh"><div class="mdt">UPDATE PROGRESS</div><button class="ib" id="mc">✕</button></div><div style="font-size:12px;color:var(--t2);margin-bottom:12px">${esc(g.name)}</div><div class="fld"><input id="gp-v" type="range" min="0" max="100" value="${g.progress||0}" oninput="document.getElementById('gp-l').textContent=this.value+'%'" style="accent-color:var(--o)"/><div id="gp-l" style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--o)">${g.progress||0}%</div></div><button class="btn pr" id="gp-save" style="width:100%;margin-top:8px">Save</button>`,'sm');onBtn('mc',closeModal);onBtn('gp-save',async()=>{g.progress=parseInt(document.getElementById('gp-v')?.value||0);await dbPut('goals',g);closeModal();render();gainXP(5,'Progress logged');toast('Progress updated')})}
async function syncGoalProg(goalId){const steps=S.gsteps.filter(x=>x.goalId===goalId);const g=S.goals.find(x=>x.id===goalId);if(g&&steps.length){g.progress=Math.round(100*steps.filter(x=>x.done).length/steps.length);await dbPut('goals',g)}}
async function toggleStep(id){const s=S.gsteps.find(x=>x.id===id);if(!s)return;s.done=!s.done;await dbPut('gsteps',s);await syncGoalProg(s.goalId);render()}
async function deleteStep(id){const s=S.gsteps.find(x=>x.id===id);if(!s)return;await dbDel('gsteps',id);S.gsteps=S.gsteps.filter(x=>x.id!==id);await syncGoalProg(s.goalId);render()}
function journalModal(id){const e=id?S.journal.find(x=>x.id===id):null;const type=e?.type||S.jtab,fields=JF[type]||[],data=e?.data||{};openModal(`<div class="mdh"><div class="mdt">${e?'EDIT':'NEW'} ${type.toUpperCase()}</div><button class="ib" id="mc">✕</button></div><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t2);margin-bottom:12px">${e?.date||today()}</div>${fields.map(f=>`<div class="fld"><div class="flbl">${esc(f[1])}</div>${f[2]==='ta'?`<textarea id="jf-${f[0]}">${esc(data[f[0]]||'')}</textarea>`:`<input id="jf-${f[0]}" type="${f[2]==='t'?'text':'number'}" value="${esc(data[f[0]]||'')}"/>`}</div>`).join('')}<button class="btn pr" id="j-save" style="width:100%;margin-top:12px">Save Entry</button>`,'lg');onBtn('mc',closeModal);onBtn('j-save',async()=>{const d={};fields.forEach(f=>{const el=document.getElementById('jf-'+f[0]);if(el)d[f[0]]=el.value.trim()});const obj={id:e?.id||uid(),type,date:e?.date||today(),data:d,createdAt:e?.createdAt||now()};await dbPut('journal',obj);if(e){const i=S.journal.findIndex(x=>x.id===e.id);if(i>=0)S.journal[i]=obj;else S.journal.push(obj)}else{S.journal.push(obj);await gainXP(10,'Journal entry')}closeModal();render();toast('Entry saved')})}
async function deleteJournal(id){if(!confirm('Delete this entry?'))return;await dbDel('journal',id);S.journal=S.journal.filter(x=>x.id!==id);render();toast('Entry deleted')}
function jCompareModal(id){const e=S.journal.find(x=>x.id===id);if(!e)return;const fields=JF[e.type]||[];const prev=S.journal.filter(x=>x.type===e.type&&x.date<e.date).sort((a,b)=>b.date.localeCompare(a.date))[0];openModal(`<div class="mdh"><div class="mdt">COMPARE</div><button class="ib" id="mc">✕</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--o);text-transform:uppercase;margin-bottom:10px">${e.date}</div>${fields.map(f=>`<div style="margin-bottom:9px"><div style="font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-bottom:2px">${esc(f[1])}</div><div style="font-size:12px;line-height:1.4">${esc(e.data?.[f[0]]||'—')}</div></div>`).join('')}</div><div>${prev?`<div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t2);text-transform:uppercase;margin-bottom:10px">${prev.date}</div>${fields.map(f=>`<div style="margin-bottom:9px"><div style="font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-bottom:2px">${esc(f[1])}</div><div style="font-size:12px;color:var(--t2);line-height:1.4">${esc(prev.data?.[f[0]]||'—')}</div></div>`).join('')}`:`<div style="color:var(--t3);font-size:12px;padding-top:30px">No previous entry.</div>`}</div></div>`,'lg');onBtn('mc',closeModal)}
function projectModal(id,prefill){const p=id?S.projects.find(x=>x.id===id):null;openModal(`<div class="mdh"><div class="mdt">${p?'EDIT':'ADD'} PROJECT</div><button class="ib" id="mc">✕</button></div><div class="fld"><div class="flbl">Title <span class="req">*</span></div><input id="p-title" value="${esc(p?.title||prefill||'')}"/></div><div class="fld"><div class="flbl">Description / Plan</div><textarea id="p-desc" style="min-height:110px">${esc(p?.desc||'')}</textarea></div><div class="fld"><div class="flbl">Pillar</div><input id="p-pillar" value="${esc(p?.pillar||'')}" placeholder="Brand, AI, Health…"/></div><div class="fld"><div class="flbl">Status</div><select id="p-status"><option value="planned"${p?.status==='planned'?' selected':''}>Planned</option><option value="progress"${p?.status==='progress'?' selected':''}>In Progress</option><option value="done"${p?.status==='done'?' selected':''}>Done</option><option value="paused"${p?.status==='paused'?' selected':''}>Paused</option></select></div><div class="fld"><div class="flbl">Progress (%)</div><input id="p-prog" type="number" min="0" max="100" value="${p?.progress||0}"/></div><div style="display:flex;gap:7px;margin-top:14px"><button class="btn pr" id="p-save" style="flex:1">Save</button>${p?`<button class="btn dg" id="p-del">Delete</button>`:''}</div>`,'lg');onBtn('mc',closeModal);onBtn('p-save',async()=>{const title=inp('p-title').trim();if(!title)return toast('Enter a title','err');const obj={id:p?.id||uid(),title,desc:inp('p-desc').trim(),pillar:inp('p-pillar').trim(),status:inp('p-status'),progress:parseInt(inp('p-prog'))||0,createdAt:p?.createdAt||now()};await dbPut('projects',obj);if(p){const i=S.projects.findIndex(x=>x.id===p.id);if(i>=0)S.projects[i]=obj;else S.projects.push(obj)}else{S.projects.push(obj);await gainXP(10,'New project')}if(prefill){const idea=S.ideas.find(x=>x.text===prefill);if(idea){await dbDel('ideas',idea.id);S.ideas=S.ideas.filter(x=>x.id!==idea.id)}}closeModal();render();toast('Project saved')});if(p)onBtn('p-del',()=>deleteProject(p.id))}
async function deleteProject(id){if(!confirm('Delete?'))return;await dbDel('projects',id);S.projects=S.projects.filter(x=>x.id!==id);closeModal();render();toast('Deleted')}
function projProgModal(id){const p=S.projects.find(x=>x.id===id);if(!p)return;openModal(`<div class="mdh"><div class="mdt">UPDATE PROGRESS</div><button class="ib" id="mc">✕</button></div><div style="font-size:12px;color:var(--t2);margin-bottom:12px">${esc(p.title)}</div><div class="fld"><input id="pp-v" type="range" min="0" max="100" value="${p.progress||0}" oninput="document.getElementById('pp-l').textContent=this.value+'%'" style="accent-color:var(--o)"/><div id="pp-l" style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--o)">${p.progress||0}%</div></div><button class="btn pr" id="pp-save" style="width:100%;margin-top:8px">Save</button>`,'sm');onBtn('mc',closeModal);onBtn('pp-save',async()=>{p.progress=parseInt(document.getElementById('pp-v')?.value||0);await dbPut('projects',p);closeModal();render();toast('Updated')})}
async function deleteIdea(id){if(!confirm('Delete?'))return;await dbDel('ideas',id);S.ideas=S.ideas.filter(x=>x.id!==id);render()}
function addIdeaModal(){openModal(`<div class="mdh"><div class="mdt">CAPTURE IDEA</div><button class="ib" id="mc">✕</button></div><div class="fld"><textarea id="idea-txt" style="min-height:90px" placeholder="Brain dump…"></textarea></div><button class="btn pr" id="idea-save" style="width:100%;margin-top:8px">Capture</button>`,'sm');onBtn('mc',closeModal);document.getElementById('idea-txt')?.focus();onBtn('idea-save',async()=>{const t=inp('idea-txt').trim();if(!t)return;const i={id:uid(),text:t,createdAt:now()};await dbPut('ideas',i);S.ideas.push(i);closeModal();render();toast('Captured')})}
function calEventModal(id,prefDate){const e=id?S.calevents.find(x=>x.id===id):null;openModal(`<div class="mdh"><div class="mdt">${e?'EDIT':'ADD'} EVENT</div><button class="ib" id="mc">✕</button></div><div class="fld"><div class="flbl">Title <span class="req">*</span></div><input id="ce-title" value="${esc(e?.title||'')}" placeholder="Event title"/></div><div class="fld"><div class="flbl">Date</div><input id="ce-date" type="date" value="${esc(e?.date||prefDate||today())}"/></div><div class="fld"><div class="flbl">Type</div><select id="ce-type"><option value="event"${e?.type==='event'?' selected':''}>Event</option><option value="deadline"${e?.type==='deadline'?' selected':''}>Deadline</option><option value="task"${e?.type==='task'?' selected':''}>Task</option></select></div><div class="fld"><div class="flbl">Notes</div><input id="ce-notes" value="${esc(e?.notes||'')}"/></div><div style="display:flex;gap:7px;margin-top:14px"><button class="btn pr" id="ce-save" style="flex:1">Save</button>${e?`<button class="btn dg" id="ce-del">Delete</button>`:''}</div>`,'sm');onBtn('mc',closeModal);onBtn('ce-save',async()=>{const title=inp('ce-title').trim();if(!title)return toast('Enter a title','err');const obj={id:e?.id||uid(),title,date:inp('ce-date'),type:inp('ce-type'),notes:inp('ce-notes').trim(),createdAt:now()};if(S.gConnected&&S.gToken){const gEv=e?.gId?await updateGCalEvent(e.gId,title,inp('ce-date')):await createGCalEvent(title,inp('ce-date'));if(gEv?.id)obj.gId=gEv.id}await dbPut('calevents',obj);if(e){const i=S.calevents.findIndex(x=>x.id===e.id);if(i>=0)S.calevents[i]=obj;else S.calevents.push(obj)}else S.calevents.push(obj);closeModal();render();toast('Event saved')});if(e)onBtn('ce-del',async()=>{if(!confirm('Delete?'))return;if(e.gId&&S.gToken)await deleteGCalEvent(e.gId);await dbDel('calevents',e.id);S.calevents=S.calevents.filter(x=>x.id!==e.id);closeModal();render();toast('Deleted')})}
function editGCalEvModal(gId){const e=S.gcalevents.find(x=>x.id===gId);if(!e)return;const date=(e.start?.date||e.start?.dateTime||'').slice(0,10);openModal(`<div class="mdh"><div class="mdt">EDIT GOOGLE EVENT</div><button class="ib" id="mc">✕</button></div><div style="font-size:10px;color:var(--t2);font-family:'JetBrains Mono',monospace;margin-bottom:12px">Synced from Google Calendar</div><div class="fld"><div class="flbl">Title</div><input id="ge-title" value="${esc(e.summary||'')}"/></div><div class="fld"><div class="flbl">Date</div><input id="ge-date" type="date" value="${esc(date)}"/></div><div style="display:flex;gap:7px;margin-top:14px"><button class="btn pr" id="ge-save" style="flex:1">Save to Google Calendar</button><button class="btn dg" id="ge-del">Delete</button></div>`,'sm');onBtn('mc',closeModal);onBtn('ge-save',async()=>{const title=inp('ge-title').trim();if(!title)return toast('Enter a title','err');await updateGCalEvent(gId,title,inp('ge-date'));e.summary=title;e.start={date:inp('ge-date')};e.end={date:inp('ge-date')};closeModal();render();toast('Updated in Google Calendar')});onBtn('ge-del',async()=>{if(!confirm('Delete from Google Calendar?'))return;await deleteGCalEvent(gId);S.gcalevents=S.gcalevents.filter(x=>x.id!==gId);closeModal();render();toast('Deleted from Google Calendar')})}
function captureModal(){openModal(`<div class="mdh"><div class="mdt">QUICK CAPTURE</div><button class="ib" id="mc">✕</button></div><div class="fld"><textarea id="cap-txt" style="min-height:80px" placeholder="Idea, task, thought…"></textarea></div><div class="fld"><div class="flbl">Save As</div><select id="cap-type"><option value="idea">Idea → Inbox</option><option value="habit">New Habit</option><option value="goal">New Goal</option></select></div><button class="btn pr" id="cap-save" style="width:100%;margin-top:8px">Capture</button>`,'sm');onBtn('mc',closeModal);document.getElementById('cap-txt')?.focus();onBtn('cap-save',async()=>{const t=inp('cap-txt').trim();if(!t)return;const type=inp('cap-type');closeModal();if(type==='idea'){const i={id:uid(),text:t,createdAt:now()};await dbPut('ideas',i);S.ideas.push(i);render();toast('Captured')}else if(type==='habit')habitModal();else if(type==='goal')goalModal()})}
function focusModal(){openModal(`<div class="mdh"><div class="mdt">SET FOCUS</div><button class="ib" id="mc">✕</button></div><div class="fld"><input id="foc-v" value="${esc(S.settings.focus||'')}" placeholder="Your #1 priority today…"/></div><button class="btn pr" id="foc-save" style="width:100%;margin-top:8px">Set Focus</button>`,'sm');onBtn('mc',closeModal);const fi=document.getElementById('foc-v');if(fi){fi.focus();fi.select();fi.onkeydown=e=>{if(e.key==='Enter')document.getElementById('foc-save')?.click()}}onBtn('foc-save',async()=>{S.settings.focus=(document.getElementById('foc-v')?.value||'').trim();await saveSt();closeModal();render();toast('Focus set')})}
let gTokenClient=null;
function initGCal(){if(!window.google?.accounts?.oauth2||!S.settings.gclientId)return;try{gTokenClient=google.accounts.oauth2.initTokenClient({client_id:S.settings.gclientId,scope:'https://www.googleapis.com/auth/calendar.events',callback:async resp=>{if(resp.error){toast('Google auth failed: '+resp.error,'err');return}S.gToken=resp.access_token;S.gConnected=true;await fetchGCalEvents();render()}})}catch(e){console.warn('GCal:',e)}}
function connectGCal(){if(!S.settings.gclientId){toast('Add Client ID in Settings','warn');return}if(!gTokenClient)initGCal();if(!gTokenClient){toast('Google API loading — try again','warn');return}gTokenClient.requestAccessToken()}
async function fetchGCalEvents(){if(!S.gToken)return;const tmin=new Date(S.calY,S.calM,1).toISOString();const tmax=new Date(S.calY,S.calM+1,1).toISOString();try{const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(tmin)}&timeMax=${encodeURIComponent(tmax)}&singleEvents=true&orderBy=startTime&maxResults=250`,{headers:{Authorization:'Bearer '+S.gToken}});if(r.status===401){S.gToken=null;S.gConnected=false;render();toast('Session expired — reconnect','warn');return}const d=await r.json();if(d.error){toast('Google: '+d.error.message,'err');return}S.gcalevents=d.items||[];render();toast(S.gcalevents.length+' events loaded')}catch(e){toast('Calendar fetch failed','err')}}
async function createGCalEvent(title,date){if(!S.gToken)return null;const end=new Date(date);end.setDate(end.getDate()+1);try{const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',headers:{Authorization:'Bearer '+S.gToken,'Content-Type':'application/json'},body:JSON.stringify({summary:title,start:{date},end:{date:end.toISOString().slice(0,10)}})});return await r.json()}catch{return null}}
async function updateGCalEvent(gId,title,date){if(!S.gToken)return null;const end=new Date(date);end.setDate(end.getDate()+1);try{const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${gId}`,{method:'PUT',headers:{Authorization:'Bearer '+S.gToken,'Content-Type':'application/json'},body:JSON.stringify({summary:title,start:{date},end:{date:end.toISOString().slice(0,10)}})});return await r.json()}catch{return null}}
async function deleteGCalEvent(gId){if(!S.gToken)return;try{await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${gId}`,{method:'DELETE',headers:{Authorization:'Bearer '+S.gToken}})}catch{}}
document.addEventListener('click',e=>{const ni=e.target.closest('[data-nav]');if(ni){go(ni.dataset.nav);return}const btn=e.target.closest('[data-a]');if(!btn)return;const a=btn.dataset.a,id=btn.dataset.id;switch(a){case 'nav':go(id);break;case 'addHabit':habitModal();break;case 'editHabit':habitModal(id);break;case 'delHabit':deleteHabit(id);break;case 'tog':toggleHabit(id);break;case 'plus':adjHabit(id,1);break;case 'minus':adjHabit(id,-1);break;case 'addGoal':goalModal();break;case 'editGoal':goalModal(id);break;case 'delGoal':deleteGoal(id);break;case 'addStep':stepModal(id);break;case 'goalProg':goalProgModal(id);break;case 'togStep':toggleStep(id);break;case 'delStep':deleteStep(id);break;case 'addJournal':journalModal();break;case 'editJournal':journalModal(id);break;case 'delJournal':deleteJournal(id);break;case 'jtab':S.jtab=id;render();break;case 'jcmp':jCompareModal(id);break;case 'addProject':projectModal();break;case 'editProject':projectModal(id);break;case 'delProject':deleteProject(id);break;case 'projProg':projProgModal(id);break;case 'addIdea':addIdeaModal();break;case 'delIdea':deleteIdea(id);break;case 'promoIdea':{const idea=S.ideas.find(x=>x.id===id);if(idea)projectModal(null,idea.text);break}case 'addCalEv':calEventModal();break;case 'addCalEvDate':calEventModal(null,id);break;case 'editCalEv':calEventModal(id);break;case 'editGCalEv':editGCalEvModal(id);break;case 'calprev':S.calM--;if(S.calM<0){S.calM=11;S.calY--}render();if(S.gConnected)fetchGCalEvents();break;case 'calnext':S.calM++;if(S.calM>11){S.calM=0;S.calY++}render();if(S.gConnected)fetchGCalEvents();break;case 'gccon':connectGCal();break;case 'gcref':fetchGCalEvents();break;case 'cap':captureModal();break;case 'focus':focusModal();break}});
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
async function init(){await openDB();await loadAll();renderNav();renderUser();render();setTimeout(initGCal,1500)}
init();
</script>
